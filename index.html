<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F5F2EB">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; worker-src 'none'">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="懐紙">
  <title>懐紙</title>
  <link rel="apple-touch-icon" href="./kaishi-icon.png">
  <link rel="icon" href="./kaishi-icon.png">
  <style>
:root {
  --paper: #f5f2eb;
  --paper-deep: #e9e6df;
  --surface: #fffefa;
  --ink: #2c2924;
  --muted: #726d66;
  --border: #d8d3ca;
  --accent: #526d78;
  --accent-strong: #3f5a66;
  --danger: #9a4037;
  --danger-soft: #f3ded9;
  --warning: #7a5b1f;
  --warning-soft: #f2e6bf;
  --success: #456551;
  --shadow: 0 8px 24px rgb(44 41 36 / 10%);
  --editor-font-size: 17px;
  --editor-line-height: 1.9;
  --editor-margin: 20px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  --font-mincho: "Hiragino Mincho ProN", "Yu Mincho", serif;
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --paper: #1d1c1a; --paper-deep: #151412; --surface: #282622; --ink: #f1ede5;
    --muted: #b8b1a7; --border: #45413b; --accent: #9bb9c4; --accent-strong: #b7ccd4;
    --danger: #e59a90; --danger-soft: #4b2925; --warning: #e6c574; --warning-soft: #41371e;
    --success: #9fc2aa; --shadow: 0 8px 24px rgb(0 0 0 / 28%);
  }
}

:root[data-theme="dark"] {
  --paper: #1d1c1a; --paper-deep: #151412; --surface: #282622; --ink: #f1ede5;
  --muted: #b8b1a7; --border: #45413b; --accent: #9bb9c4; --accent-strong: #b7ccd4;
  --danger: #e59a90; --danger-soft: #4b2925; --warning: #e6c574; --warning-soft: #41371e;
  --success: #9fc2aa; --shadow: 0 8px 24px rgb(0 0 0 / 28%);
}

* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: var(--paper); color: var(--ink); }
body { font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
button, input, textarea, select { font: inherit; color: inherit; }
button { -webkit-tap-highlight-color: transparent; }
a { color: var(--accent-strong); }
[hidden] { display: none !important; }
.sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }

#app { min-height: 100dvh; max-width: 720px; margin: 0 auto; background: var(--paper); }
.screen { min-height: 100dvh; padding: env(safe-area-inset-top) 16px calc(92px + env(safe-area-inset-bottom)); }
.screen.editor-screen, .screen.preview-screen { padding-bottom: env(safe-area-inset-bottom); }

.app-header {
  position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 8px;
  min-height: 68px; padding: 8px 0; background: color-mix(in srgb, var(--paper) 92%, transparent);
  backdrop-filter: blur(14px);
}
.brand { margin: 0; font-family: var(--font-mincho); font-size: 24px; letter-spacing: .16em; }
.header-title { flex: 1; min-width: 0; margin: 0; text-align: center; font-size: 16px; }
.header-title span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.save-state { margin-top: 2px; font-size: 11px; font-weight: 400; color: var(--muted); }

.icon-button, .round-button, .small-button, .button {
  border: 1px solid var(--border); background: var(--surface); cursor: pointer;
}
.icon-button { display: grid; place-items: center; flex: 0 0 46px; width: 46px; height: 46px; border-radius: 15px; font-size: 21px; }
.icon-button:active, .button:active, .row-button:active, .sticky-card:active { transform: translateY(1px); filter: brightness(.97); }
.button { min-height: 48px; padding: 11px 17px; border-radius: 14px; font-weight: 700; }
.button.primary { color: #fff; border-color: var(--accent); background: var(--accent); }
.button.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 45%, var(--border)); background: var(--danger-soft); }
.button.ghost { background: transparent; }
.button:disabled, .icon-button:disabled { opacity: .42; cursor: default; }
.button-row { display: flex; gap: 10px; flex-wrap: wrap; }
.button-row > * { flex: 1 1 130px; }
.section-title-row { display: flex; align-items: center; min-height: 46px; margin-top: 10px; }
.section-title { flex: 1; margin: 0; font-size: 14px; letter-spacing: .06em; }
.small-button { min-height: 40px; padding: 8px 13px; border-radius: 20px; font-size: 13px; font-weight: 700; }

.notice { margin: 4px 0 10px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 13px; background: var(--surface); }
.notice.compact { display: flex; align-items: center; gap: 10px; padding: 9px 11px; font-size: 13px; }
.notice.compact span { flex: 1; }
.notice.warning { color: var(--warning); border-color: color-mix(in srgb, var(--warning) 35%, var(--border)); background: var(--warning-soft); }
.notice.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--border)); background: var(--danger-soft); }
.offline-badge { padding: 5px 9px; border-radius: 9px; color: var(--muted); background: var(--paper-deep); font-size: 12px; }

.sticky-strip { display: flex; gap: 10px; margin: 0 -16px; padding: 0 16px 4px; overflow-x: auto; scroll-snap-type: x proximity; scrollbar-width: none; }
.sticky-strip::-webkit-scrollbar { display: none; }
.sticky-card { flex: 0 0 min(72vw, 260px); min-height: 94px; padding: 14px; border: 0; border-radius: 14px; color: #2c2924; text-align: left; scroll-snap-align: start; white-space: pre-wrap; box-shadow: 0 2px 7px rgb(44 41 36 / 8%); }
.sticky-card time { display: block; margin-top: 10px; font-size: 11px; opacity: .62; }

.list { display: grid; gap: 8px; }
.row-button { display: flex; align-items: center; width: 100%; min-height: 58px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 13px; background: var(--surface); text-align: left; cursor: pointer; }
.color-bar { align-self: stretch; flex: 0 0 5px; margin: -10px 11px -10px -12px; border-radius: 4px 0 0 4px; }
.folder-mark { position: relative; flex: 0 0 24px; width: 24px; height: 17px; margin-right: 12px; border-radius: 4px; background: var(--item-color); }
.folder-mark::before { content: ""; position: absolute; top: -5px; left: 3px; width: 11px; height: 7px; border-radius: 3px 3px 0 0; background: var(--item-color); }
.row-main { flex: 1; min-width: 0; }
.row-title { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px; font-weight: 700; }
.row-meta { display: block; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-size: 11px; }
.chevron { margin-left: 10px; color: var(--muted); font-size: 22px; }
.empty { margin: 10px 0; padding: 18px; border: 1px dashed var(--border); border-radius: 14px; color: var(--muted); text-align: center; }

.fab { position: fixed; right: max(20px, calc((100vw - 720px) / 2 + 20px)); bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 25; width: 62px; height: 62px; border: 0; border-radius: 50%; color: #fff; background: var(--accent); box-shadow: var(--shadow); font-size: 27px; }

.sheet { width: min(100%, 720px); max-height: min(86dvh, 760px); margin: auto auto 0; padding: 0; border: 0; border-radius: 24px 24px 0 0; color: var(--ink); background: var(--paper); box-shadow: 0 -12px 42px rgb(0 0 0 / 20%); }
.sheet::backdrop { background: rgb(20 18 15 / 38%); backdrop-filter: blur(2px); }
.sheet[open] { animation: sheet-in .18s ease-out; }
@keyframes sheet-in { from { transform: translateY(28px); opacity: .6; } }
.sheet-inner { max-height: min(86dvh, 760px); padding: 12px 16px calc(18px + env(safe-area-inset-bottom)); overflow-y: auto; }
.sheet-handle { width: 42px; height: 5px; margin: 0 auto 10px; border-radius: 3px; background: var(--border); }
.sheet-header { display: flex; align-items: center; gap: 10px; min-height: 52px; }
.sheet-header h2 { flex: 1; margin: 0; font-size: 18px; }
.sheet-list { display: grid; gap: 7px; margin-top: 8px; }
.menu-button { display: flex; align-items: center; gap: 12px; width: 100%; min-height: 52px; padding: 11px 13px; border: 1px solid var(--border); border-radius: 13px; background: var(--surface); text-align: left; font-weight: 700; }
.menu-button small { display: block; margin-top: 2px; color: var(--muted); font-weight: 400; }
.menu-button.danger { margin-top: 14px; color: var(--danger); border-color: color-mix(in srgb, var(--danger) 35%, var(--border)); background: var(--danger-soft); }

.field { display: grid; gap: 6px; margin: 12px 0; }
.field > span, .field-label { font-size: 13px; font-weight: 700; }
.text-input, .text-area, .select-input { width: 100%; min-height: 48px; padding: 11px 13px; border: 1px solid var(--border); border-radius: 12px; color: var(--ink); background: var(--surface); outline: 0; }
.text-input:focus, .text-area:focus, .select-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
.text-area { min-height: 130px; resize: vertical; line-height: 1.65; }
.color-choices { display: flex; gap: 9px; flex-wrap: wrap; }
.color-choice { display: grid; place-items: center; width: 48px; height: 48px; border: 2px solid transparent; border-radius: 14px; color: #2c2924; background: var(--choice-color); font-weight: 800; }
.color-choice.selected { border-color: var(--ink); }
.segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.segmented button { min-height: 46px; padding: 8px; border: 1px solid var(--border); border-radius: 11px; background: var(--surface); }
.segmented button.selected { color: #fff; border-color: var(--accent); background: var(--accent); }

.editor-screen { display: flex; flex-direction: column; height: var(--editor-viewport-height, 100dvh); min-height: 0; }
.editor-screen .app-header { flex: 0 0 auto; }
.editor-wrap { position: relative; display: flex; flex: 1 1 auto; min-height: 0; padding-bottom: 58px; }
.editor { width: 100%; min-height: 0; padding: 18px var(--editor-margin) 42px; border: 1px solid var(--border); border-radius: 15px; color: var(--ink); background: var(--surface); caret-color: var(--accent); font-family: var(--editor-font, var(--font-mincho)); font-size: var(--editor-font-size); line-height: var(--editor-line-height); resize: none; outline: none; tab-size: 2; }
.editor:focus { border-color: color-mix(in srgb, var(--accent) 55%, var(--border)); }
.editor-toolbar { position: absolute; right: 0; bottom: 0; left: 0; display: flex; gap: 6px; height: 54px; padding: 5px 2px; overflow: hidden; background: var(--paper); }
.editor-toolbar::-webkit-scrollbar { display: none; }
.tool-button { flex: 1 1 0; min-width: 0; height: 44px; padding: 0 11px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); font-weight: 700; }
.tool-button:disabled { opacity: .4; }

.search-panel { position: absolute; z-index: 12; top: 4px; right: 4px; left: 4px; padding: 9px; border: 1px solid var(--border); border-radius: 14px; background: var(--paper); box-shadow: var(--shadow); }
.search-row { display: flex; gap: 7px; margin-top: 7px; }
.search-row:first-child { margin-top: 0; }
.search-row .text-input { min-width: 0; }
.search-count { display: grid; place-items: center; flex: 0 0 58px; color: var(--muted); font-size: 12px; }

.preview-screen { display: flex; flex-direction: column; height: 100dvh; min-height: 0; }
.preview-content { flex: 1; overflow-y: auto; padding: 18px var(--editor-margin) 80px; border: 1px solid var(--border); border-radius: 15px; background: var(--surface); font-family: var(--editor-font, var(--font-mincho)); font-size: var(--editor-font-size); line-height: var(--editor-line-height); }
.preview-content p { margin: 0 0 .9em; }
.preview-content h1 { font-size: 1.65em; }
.preview-content h2 { font-size: 1.38em; }
.preview-content h3 { font-size: 1.16em; }
.preview-content blockquote { margin: 1em 0; padding: .1em 1em; border-left: 4px solid var(--accent); color: var(--muted); }
.preview-content .blank-line { height: .85em; }
.preview-content ruby rt { font-size: .55em; }
.preview-edit { position: fixed; right: max(20px, calc((100vw - 720px) / 2 + 20px)); bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 25; }

.meta-grid { display: grid; grid-template-columns: minmax(100px, 38%) 1fr; border-top: 1px solid var(--border); }
.meta-grid dt, .meta-grid dd { margin: 0; padding: 11px 4px; border-bottom: 1px solid var(--border); }
.meta-grid dt { color: var(--muted); }
.danger-zone { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
.drag-list { display: grid; gap: 8px; }
.drag-item { display: flex; align-items: center; min-height: 54px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); }

.toast { position: fixed; z-index: 100; right: 16px; bottom: calc(22px + env(safe-area-inset-bottom)); left: 16px; max-width: 520px; margin: auto; padding: 12px 15px; border-radius: 13px; color: #fff; background: #282622; box-shadow: var(--shadow); text-align: center; font-weight: 700; }
.install-screen { display: grid; place-items: center; min-height: 100dvh; padding: max(28px, env(safe-area-inset-top)) 22px max(28px, env(safe-area-inset-bottom)); background: var(--paper); }
.install-card { width: min(100%, 420px); padding: 24px; border: 1px solid var(--border); border-radius: 24px; background: var(--surface); box-shadow: var(--shadow); }
.install-icon { display: block; width: 92px; height: 92px; margin: 0 auto 17px; border-radius: 22px; }
.install-card h1 { margin: 0; text-align: center; font-family: var(--font-mincho); letter-spacing: .14em; }
.install-card ol { display: grid; gap: 13px; margin: 22px 0 0; padding-left: 24px; line-height: 1.65; }
.install-note { margin-top: 18px; color: var(--muted); font-size: 13px; line-height: 1.6; }

@media (max-width: 390px) {
  .screen { padding-right: 12px; padding-left: 12px; }
  .sticky-strip { margin-right: -12px; margin-left: -12px; padding-right: 12px; padding-left: 12px; }
  .header-title { font-size: 14px; }
  .icon-button { flex-basis: 44px; width: 44px; height: 44px; }
}

@media (min-width: 721px) {
  body { background: var(--paper-deep); }
  #app { box-shadow: 0 0 45px rgb(44 41 36 / 12%); }
}

  </style>
</head>

  <input id="json-file-input" type="file" accept="application/json,.json" hidden>

  function safeUrl(raw) {
    const value = String(raw ?? "").trim();
    if (/^(https?:|mailto:)/i.test(value)) return escapeHtml(value);
    return "#";
  }
  function renderInline(source = "") {
    let html = escapeHtml(source);
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => `<a href="${safeUrl(url)}" rel="noopener noreferrer">${label}</a>`);
    html = html.replace(/\{([^{}|]+)\|([^{}]+)\}/g, "<ruby>$1<rp>\uFF08</rp><rt>$2</rt><rp>\uFF09</rp></ruby>");
    html = html.replace(/\|([^《》\n|]{1,60})《([^《》\n]{1,60})》/g, "<ruby>$1<rp>\uFF08</rp><rt>$2</rt><rp>\uFF09</rp></ruby>");
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    html = html.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^_\n]+)__/g, "<strong>$1</strong>");
    html = html.replace(/~~([^~\n]+)~~/g, "<del>$1</del>");
    html = html.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, "$1<em>$2</em>");
    return html;
  }
  function renderMarkdown(source = "") {
    const lines = String(source).replace(/\r\n?/g, "\n").split("\n");
    const output = [];
    let listType = null;
    let quoteOpen = false;
    let codeOpen = false;
    const closeList = () => {
      if (listType) output.push(`</${listType}>`);
      listType = null;
    };
    const closeQuote = () => {
      if (quoteOpen) output.push("</blockquote>");
      quoteOpen = false;
    };
    for (const line of lines) {
      if (/^```/.test(line)) {
        closeList();
        closeQuote();
        output.push(codeOpen ? "</code></pre>" : "<pre><code>");
        codeOpen = !codeOpen;
        continue;
      }
      if (codeOpen) {
        output.push(`${escapeHtml(line)}
`);
        continue;
      }
      if (!line.trim()) {
        closeList();
        closeQuote();
        output.push('<div class="blank-line" aria-hidden="true"></div>');
        continue;
      }
      const heading = line.match(/^(#{1,3})\s+(.+)$/);
      if (heading) {
        closeList();
        closeQuote();
        const level = heading[1].length;
        output.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
        continue;
      }
      if (/^\s*(?:-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
        closeList();
        closeQuote();
        output.push("<hr>");
        continue;
      }
      const quote = line.match(/^>\s?(.*)$/);
      if (quote) {
        closeList();
        if (!quoteOpen) {
          output.push("<blockquote>");
          quoteOpen = true;
        }
        output.push(`<p>${renderInline(quote[1])}</p>`);
        continue;
      }
      closeQuote();
      const unordered = line.match(/^\s*[-+*]\s+(.+)$/);
      const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
      if (unordered || ordered) {
        const nextType = ordered ? "ol" : "ul";
        if (listType !== nextType) {
          closeList();
          output.push(`<${nextType}>`);
          listType = nextType;
        }
        output.push(`<li>${renderInline((ordered || unordered)[1])}</li>`);
        continue;
      }
      closeList();
      output.push(`<p>${renderInline(line)}</p>`);
    }
    closeList();
    closeQuote();
    if (codeOpen) output.push("</code></pre>");
    return output.join("\n");
  }
  function markdownToPlainText(source = "") {
    return stripMarkdown(source).replace(/\n{3,}/g, "\n\n");
  }

  var UndoManager = class {
    constructor(limit = 50) {
      this.limit = limit;
      this.undoStack = [];
      this.redoStack = [];
    }
    clear() {
      this.undoStack = [];
      this.redoStack = [];
    }
    record(snapshot) {
      const previous = this.undoStack.at(-1);
      if (previous && previous.value === snapshot.value && previous.start === snapshot.start && previous.end === snapshot.end) return;
      this.undoStack.push({ ...snapshot });
      if (this.undoStack.length > this.limit) this.undoStack.shift();
      this.redoStack = [];
    }
    undo(current) {
      const target = this.undoStack.pop();
      if (!target) return null;
      this.redoStack.push({ ...current });
      return target;
    }
    redo(current) {
      const target = this.redoStack.pop();
      if (!target) return null;
      this.undoStack.push({ ...current });
      return target;
    }
    get canUndo() {
      return this.undoStack.length > 0;
    }
    get canRedo() {
      return this.redoStack.length > 0;
    }
  };

  async function handleAction(action, element) {
    if (!action) return;
    try {
      if (action === "go-home") return runtime.editor ? leaveEditor({ name: "home" }) : setRoute({ name: "home" });
      if (action === "home-menu") return showHomeMenu();
      if (action === "open-folder") return setRoute({ name: "folder", folderId: element.dataset.id });
      if (action === "folder-back-parent") {
        const folder = await getFolder(runtime.route.folderId);
        return setRoute(folder.parentId ? { name: "folder", folderId: folder.parentId } : { name: "home" });
      }
      if (action === "folder-menu") return showFolderMenu();
      if (action === "new-folder") return folderForm(element.dataset.parentId || null);
      if (action === "edit-folder") return folderForm((await getFolder(element.dataset.id)).parentId, await getFolder(element.dataset.id));
      if (action === "move-folder") return showMovePicker("folder", element.dataset.id);
      if (action === "reorder-folder-items") return showFolderContentsReorder(element.dataset.id);
      if (action === "export-folder") {
        closeSheet();
        return exportFolder(element.dataset.id);
      }
      if (action === "trash-folder") {
        const contents = await buildExport("folder", element.dataset.id);
        const documentCount = contents.documents.filter((item) => !item.deletedAt).length;
        const folderCount = Math.max(0, contents.folders.filter((item) => !item.deletedAt).length - 1);
        if (confirm(`\u4E2D\u306E\u539F\u7A3F${documentCount}\u4EF6\u30FB\u4E0B\u4F4D\u30D5\u30A9\u30EB\u30C0${folderCount}\u4EF6\u3082\u30B4\u30DF\u7BB1\u306B\u5165\u308A\u307E\u3059\u3002`)) {
          await moveToTrash("folder", element.dataset.id);
          closeSheet();
          setRoute({ name: "home" });
          showToast("\u30D5\u30A9\u30EB\u30C0\u3092\u30B4\u30DF\u7BB1\u3078\u79FB\u3057\u307E\u3057\u305F\u3002");
        }
        return;
      }
      if (action === "open-document") return setRoute({ name: "editor", documentId: element.dataset.id, returnRoute: { ...runtime.route } });
      if (action === "new-document") {
        const doc = await createDocument(element.dataset.folderId || MEMO_FOLDER_ID);
        return setRoute({ name: "editor", documentId: doc.id, returnRoute: { ...runtime.route }, focus: true });
      }
      if (action === "editor-new-document") {
        const folderId = runtime.editor.document.folderId;
        if (!await prepareToLeaveEditor()) return;
        const doc = await createDocument(folderId);
        return setRoute({ name: "editor", documentId: doc.id, returnRoute: { name: "folder", folderId }, focus: true });
      }
      if (action === "editor-back") return leaveEditor(runtime.editor.returnRoute || { name: "home" });
      if (action === "document-menu") return showDocumentMenu();
      if (action === "undo" || action === "redo") return performUndo(action);
      if (action === "markdown-menu") return showMarkdownMenu();
      if (action === "md-h1") {
        closeSheet();
        return prefixSelectedLines("# ");
      }
      if (action === "md-h2") {
        closeSheet();
        return prefixSelectedLines("## ");
      }
      if (action === "md-h3") {
        closeSheet();
        return prefixSelectedLines("### ");
      }
      if (action === "md-bold") {
        closeSheet();
        return replaceSelection("**", "**", "\u592A\u5B57");
      }
      if (action === "md-italic") {
        closeSheet();
        return replaceSelection("*", "*", "\u659C\u4F53");
      }
      if (action === "md-strike") {
        closeSheet();
        return replaceSelection("~~", "~~", "\u6253\u6D88\u3057");
      }
      if (action === "md-quote") {
        closeSheet();
        return prefixSelectedLines("> ");
      }
      if (action === "md-rule") {
        closeSheet();
        return replaceSelection("\n---\n", "", "");
      }
      if (action === "md-ruby") {
        closeSheet();
        return replaceSelection("{", "|\u3088\u307F}", "\u6F22\u5B57");
      }
      if (action === "retry-save") {
        const result = await saveEditorNow();
        if (result) showToast("\u4FDD\u5B58\u3067\u304D\u307E\u3057\u305F\u3002");
        return;
      }
      if (action === "emergency-copy") return copyPlainText(document.querySelector("#editor")?.value ?? "").then(() => showToast("\u672C\u6587\u3092\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F\u3002"));
      if (action === "emergency-file") {
        const doc = runtime.editor.document;
        return shareFile(fileFromText(`${safeFileName(doc.title)}.txt`, document.querySelector("#editor")?.value ?? ""), doc.title);
      }
      if (action === "open-preview") {
        closeSheet();
        const saved = await saveEditorNow({ quiet: true });
        if (!saved && runtime.editor?.failedError) return showToast("\u4FDD\u5B58\u3067\u304D\u3066\u3044\u306A\u3044\u305F\u3081\u3001\u30D7\u30EC\u30D3\u30E5\u30FC\u3078\u79FB\u308C\u307E\u305B\u3093\u3002");
        const textarea = document.querySelector("#editor");
        const ratio = textarea ? textarea.scrollTop / Math.max(1, textarea.scrollHeight - textarea.clientHeight) : 0;
        return setRoute({ name: "preview", documentId: runtime.editor.documentId, scrollRatio: ratio, returnRoute: runtime.editor.returnRoute });
      }
      if (action === "preview-back") {
        const preview = document.querySelector("#preview-content");
        const ratio = preview ? preview.scrollTop / Math.max(1, preview.scrollHeight - preview.clientHeight) : 0;
        return setRoute({ name: "editor", documentId: runtime.route.documentId, scrollRatio: ratio, returnRoute: runtime.route.returnRoute });
      }
      if (action === "open-search") {
        closeSheet();
        const saved = await saveEditorNow({ quiet: true });
        if (!saved && runtime.editor?.failedError) return showToast("\u4FDD\u5B58\u3067\u304D\u3066\u3044\u306A\u3044\u305F\u3081\u3001\u691C\u7D22\u3092\u958B\u3051\u307E\u305B\u3093\u3002");
        runtime.route.searchOpen = true;
        return renderEditor(runtime.editor.documentId);
      }
      if (action === "close-search") {
        const saved = await saveEditorNow({ quiet: true });
        if (!saved && runtime.editor?.failedError) return showToast("\u4FDD\u5B58\u3067\u304D\u3066\u3044\u306A\u3044\u305F\u3081\u3001\u691C\u7D22\u3092\u9589\u3058\u307E\u305B\u3093\u3002");
        runtime.route.searchOpen = false;
        return renderEditor(runtime.editor.documentId);
      }
      if (action === "show-replace") {
        document.querySelector("#replace-row").hidden = false;
        document.querySelector("#replace-term")?.focus();
        return;
      }
      if (action === "search-prev") return moveSearch(-1);
      if (action === "search-next") return moveSearch(1);
      if (action === "replace-one") return replaceCurrentMatch();
      if (action === "replace-all") return replaceAllMatches();
      if (action === "copy-note") return copyForNote();
      if (action === "copy-note-plain") {
        const doc = await getDocument(runtime.editor.documentId);
        await copyPlainText(markdownToPlainText(doc.body));
        closeSheet();
        return showToast("\u66F8\u5F0F\u306A\u3057\u3067\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F\u3002");
      }
      if (action === "copy-plain") {
        const doc = await getDocument(runtime.editor.documentId);
        await copyPlainText(doc.body);
        closeSheet();
        return showToast("\u672C\u6587\u3092\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F\u3002");
      }
      if (action === "export-document") return showDocumentExport();
      if (action === "document-info") return showDocumentInfo();
      if (action === "trash-document") {
        if (!confirm("\u3053\u306E\u539F\u7A3F\u3092\u30B4\u30DF\u7BB1\u3078\u79FB\u3057\u307E\u3059\u304B\uFF1F")) return;
        const returnRoute = runtime.editor.returnRoute || { name: "home" };
        const saved = await saveEditorNow({ quiet: true });
        if (!saved && runtime.editor?.failedError) return showToast("\u4FDD\u5B58\u3067\u304D\u3066\u3044\u306A\u3044\u305F\u3081\u3001\u30B4\u30DF\u7BB1\u3078\u79FB\u3057\u307E\u305B\u3093\u3002");
        await moveToTrash("document", runtime.editor.documentId);
        clearEditorTimers();
        runtime.editor = null;
        closeSheet();
        setRoute(returnRoute);
        return showToast("\u539F\u7A3F\u3092\u30B4\u30DF\u7BB1\u3078\u79FB\u3057\u307E\u3057\u305F\u3002");
      }
      if (action === "open-history") {
        closeSheet();
        const saved = await saveEditorNow({ quiet: true });
        if (!saved && runtime.editor?.failedError) return showToast("\u4FDD\u5B58\u3067\u304D\u3066\u3044\u306A\u3044\u305F\u3081\u3001\u5C65\u6B74\u3078\u79FB\u308C\u307E\u305B\u3093\u3002");
        return setRoute({ name: "history", documentId: runtime.editor.documentId, returnRoute: runtime.editor.returnRoute });
      }
      if (action === "history-back") return setRoute({ name: "editor", documentId: runtime.route.documentId, returnRoute: runtime.route.returnRoute });
      if (action === "history-item") return showHistoryItem(element.dataset.id);
      if (action === "restore-history") {
        if (!confirm("\u73FE\u5728\u306E\u5185\u5BB9\u3092\u5C65\u6B74\u3078\u6B8B\u3057\u3066\u3001\u3053\u306E\u5185\u5BB9\u306B\u623B\u3057\u307E\u3059\u304B\uFF1F")) return;
        const doc = await restoreHistory(element.dataset.id);
        closeSheet();
        return setRoute({ name: "editor", documentId: doc.id, returnRoute: runtime.route.returnRoute });
      }
      if (action === "duplicate-history") {
        await duplicateHistory(element.dataset.id);
        closeSheet();
        showToast("\u5225\u306E\u539F\u7A3F\u3068\u3057\u3066\u6B8B\u3057\u307E\u3057\u305F\u3002");
        return;
      }
      if (action === "new-sticky") return stickyForm();
      if (action === "edit-sticky") return stickyForm((await getHomeSnapshot()).stickies.find((item) => item.id === element.dataset.id));
      if (action === "delete-sticky") {
        const id = sheet.querySelector('[name="id"]')?.value;
        if (confirm("\u3053\u306E\u4ED8\u7B8B\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F")) {
          await deleteSticky(id);
          closeSheet();
          await renderHome();
          showToast("\u4ED8\u7B8B\u3092\u524A\u9664\u3057\u307E\u3057\u305F\u3002");
        }
        return;
      }
      if (action === "reorder-stickies") return showSimpleReorder("\u4ED8\u7B8B\u306E\u4E26\u3079\u66FF\u3048", (await getHomeSnapshot()).stickies, STORE_NAMES.stickies, renderHome);
      if (action === "choose-json") {
        closeSheet();
        jsonInput.value = "";
        jsonInput.click();
        return;
      }
      if (action === "resolve-conflict") {
        const conflict = runtime.importInspection.conflicts[runtime.pendingConflictIndex];
        if (element.dataset.resolution === "incoming" && !confirm("iPhone\u5074\u306E\u73FE\u5728\u7A3F\u3092\u5C65\u6B74\u3078\u6B8B\u3057\u3066\u3001\u8AAD\u307F\u8FBC\u307F\u5074\u3067\u4E0A\u66F8\u304D\u3057\u307E\u3059\u304B\uFF1F")) return;
        runtime.conflictResolutions[conflict.incoming.id] = element.dataset.resolution;
        runtime.pendingConflictIndex += 1;
        return showConflictReview();
      }
      if (action === "resolve-all-both") {
        runtime.importInspection.conflicts.slice(runtime.pendingConflictIndex).forEach((conflict) => {
          runtime.conflictResolutions[conflict.incoming.id] = "both";
        });
        runtime.pendingConflictIndex = runtime.importInspection.conflicts.length;
        return executeImport();
      }
      if (action === "finish-import") {
        closeSheet();
        return setRoute({ name: "home" });
      }
      if (action === "backup-library") {
        closeSheet();
        return showLibraryBackup();
      }
      if (action === "dismiss-backup") {
        await dismissBackupForToday();
        return renderHome();
      }
      if (action === "open-trash") {
        closeSheet();
        return setRoute({ name: "trash" });
      }
      if (action === "trash-menu") return showTrashMenu();
      if (action === "trash-item") return showTrashItem(element.dataset.kind, element.dataset.id);
      if (action === "restore-trash") {
        const result = await restoreFromTrash(element.dataset.kind, element.dataset.id, { restoreFolder: element.dataset.restoreFolder !== "false" });
        closeSheet();
        await renderTrash();
        showToast(result?.fallbackToMemo ? "\u5143\u306E\u30D5\u30A9\u30EB\u30C0\u3092\u623B\u3055\u305A\u3001\u539F\u7A3F\u3092\u300C\u30E1\u30E2\u300D\u3078\u623B\u3057\u307E\u3057\u305F\u3002" : "\u5143\u306E\u5834\u6240\u3078\u623B\u3057\u307E\u3057\u305F\u3002");
        return;
      }
      if (action === "delete-forever") {
        if (!confirm("\u5B8C\u5168\u306B\u524A\u9664\u3057\u307E\u3059\u3002\u3053\u306E\u64CD\u4F5C\u306F\u5143\u306B\u623B\u305B\u307E\u305B\u3093\u3002")) return;
        if (!confirm("\u672C\u5F53\u306B\u5B8C\u5168\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F")) return;
        await permanentlyDelete(element.dataset.kind, element.dataset.id);
        closeSheet();
        return renderTrash();
      }
      if (action === "empty-trash") {
        if (!confirm("\u30B4\u30DF\u7BB1\u306E\u4E2D\u8EAB\u3092\u3059\u3079\u3066\u5B8C\u5168\u306B\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F")) return;
        if (!confirm("\u3053\u306E\u64CD\u4F5C\u306F\u5143\u306B\u623B\u305B\u307E\u305B\u3093\u3002\u672C\u5F53\u306B\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F")) return;
        await emptyTrash();
        closeSheet();
        return renderTrash();
      }
      if (action === "open-settings") {
        const returnRoute = runtime.editor ? { name: "editor", documentId: runtime.editor.documentId, returnRoute: runtime.editor.returnRoute } : { ...runtime.route };
        if (runtime.editor) {
          const saved = await saveEditorNow({ quiet: true });
          if (!saved && runtime.editor.failedError) return showToast("\u4FDD\u5B58\u3067\u304D\u3066\u3044\u306A\u3044\u305F\u3081\u3001\u8A2D\u5B9A\u3078\u79FB\u308C\u307E\u305B\u3093\u3002");
        }
        closeSheet();
        return setRoute({ name: "settings", returnRoute });
      }
      if (action === "settings-back-editor" || action === "settings-done") return setRoute(runtime.route.returnRoute || { name: "home" });
      if (action === "font-size-down") return applySetting("fontSize", Math.max(14, (await getSettings()).fontSize - 1));
      if (action === "font-size-up") return applySetting("fontSize", Math.min(26, (await getSettings()).fontSize + 1));
      if (action === "reset-settings") {
        await saveSettings({ fontSize: 17, lineHeight: "standard", pageMargin: "standard", fontFamily: "mincho", theme: "system" });
        return renderSettings();
      }
      if (action === "open-about") {
        closeSheet();
        return setRoute({ name: "about" });
      }
      if (action === "open-recovery") return showRecoveryRecords();
      if (action === "recovery-item") return showRecoveryItem(element.dataset.id);
      if (action === "restore-recovery") {
        if (!confirm("\u73FE\u5728\u306E\u66F8\u5EAB\u3092\u5148\u306B\u81EA\u52D5\u4FDD\u8B77\u3057\u3066\u304B\u3089\u3001\u3053\u306E\u8A18\u9332\u306E\u6642\u70B9\u3078\u623B\u3057\u307E\u3059\u304B\uFF1F")) return;
        if (!confirm("\u66F8\u5EAB\u5168\u4F53\u304C\u5165\u308C\u66FF\u308F\u308A\u307E\u3059\u3002\u672C\u5F53\u306B\u623B\u3057\u307E\u3059\u304B\uFF1F")) return;
        await restoreInternalBackup(element.dataset.id);
        closeSheet();
        setRoute({ name: "home" });
        return showToast("\u81EA\u52D5\u4FDD\u8B77\u306E\u6642\u70B9\u3078\u623B\u3057\u307E\u3057\u305F\u3002");
      }
      if (action === "apply-update") {
        if (runtime.editor) await saveEditorNow({ quiet: true });
        runtime.updating = true;
        runtime.updateRegistration?.waiting?.postMessage({ type: "SKIP_WAITING" });
        return;
      }
      if (action === "dismiss-update") {
        runtime.updateReady = false;
        return renderHome();
      }
      if (action === "take-over") {
        const result = await runtime.guard.requestTakeover();
        if (result.blocked) return showToast("\u5148\u306B\u958B\u3044\u3066\u3044\u308B\u61D0\u7D19\u3092\u9589\u3058\u3066\u3001\u5C11\u3057\u5F85\u3063\u3066\u304B\u3089\u3082\u3046\u4E00\u5EA6\u62BC\u3057\u3066\u304F\u3060\u3055\u3044\u3002", 4200);
        return renderHome();
      }
      if (action === "stay-closed") return renderTakenOver();
      if (action === "reload-app") return location.reload();
    } catch (error) {
      showErrorSheet("\u64CD\u4F5C\u3092\u5B8C\u4E86\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F", error);
    }
  }
  function handleFatal(error) {
    console.error(error);
    app.innerHTML = `<section class="install-screen"><div class="install-card"><h1 style="letter-spacing:0">\u61D0\u7D19\u3092\u958B\u3051\u307E\u305B\u3093\u3067\u3057\u305F</h1><div class="notice danger">${escapeHtml(error?.message || "\u539F\u56E0\u3092\u78BA\u8A8D\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F\u3002")}</div><button class="button" data-action="reload-app">\u3082\u3046\u4E00\u5EA6\u958B\u304F</button></div></section>`;
  }
  app.addEventListener("click", (event) => {
    const element = event.target.closest("[data-action]");
    if (element) handleAction(element.dataset.action, element);
  });
  sheet.addEventListener("click", (event) => {
    const close = event.target.closest("[data-sheet-close]");
    if (close) {
      closeSheet();
      return;
    }
    const element = event.target.closest("[data-action]");
    if (element) handleAction(element.dataset.action, element);
  });
  sheet.addEventListener("click", (event) => {
    if (event.target === sheet) closeSheet();
  });
  document.addEventListener("click", (event) => {
    const setting = event.target.closest("[data-setting]");
    if (setting) applySetting(setting.dataset.setting, setting.dataset.value);
  });
  jsonInput.addEventListener("change", async () => {
    const file = jsonInput.files?.[0];
    if (!file) return;
    try {
      const payload = await readJsonFile(file);
      await showImportReview(await inspectImport(payload), file.name);
    } catch (error) {
      showErrorSheet("JSON\u3092\u8AAD\u307F\u8FBC\u3081\u307E\u305B\u3093\u3067\u3057\u305F", error);
    }
  });
  window.addEventListener("online", () => {
    runtime.online = true;
    if (runtime.route.name === "home") renderHome();
  });
  window.addEventListener("offline", () => {
    runtime.online = false;
    if (runtime.route.name === "home") renderHome();
  });
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") saveEditorNow({ quiet: true });
  });
  window.addEventListener("pagehide", () => {
    saveEditorNow({ quiet: true });
  });
  window.addEventListener("beforeunload", (event) => {
    if (runtime.editor?.failedError) {
      event.preventDefault();
      event.returnValue = "";
    }
  });
  boot().catch(handleFatal);
})();

  </script>
</body>
</html>
