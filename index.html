<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F5F2EB">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="懐紙">
  <title>懐紙</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app" aria-live="polite"></main>
  <dialog id="sheet" class="sheet" aria-labelledby="sheet-title"></dialog>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <input id="json-file-input" type="file" accept="application/json,.json" hidden>
  <noscript>懐紙を使うにはJavaScriptを有効にしてください。</noscript>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
